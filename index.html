<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soren</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; opacity: 0.6; }

    @keyframes pulse-live { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-dot { animation: pulse-live 2s ease-in-out infinite; }

    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
    .pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }

    .expandable { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.25s ease; }
    .expandable.open { grid-template-rows: 1fr; }
    .expandable > div { overflow: hidden; }

    .spark-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .run-row { transition: background-color 0.15s ease; }
    .dark .run-row:hover { background-color: rgba(255,255,255,0.03); }
    .run-row:hover { background-color: rgba(0,0,0,0.02); }

    .dark ::-webkit-scrollbar { width: 5px; }
    .dark ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    ::selection { background: rgba(99,102,241,0.3); }

    .agent-icon-wrap { position: relative; transition: transform 0.2s ease; }
    .agent-icon-wrap:hover { transform: translateY(-2px); }

    .agent-card { transition: all 0.2s ease; }
    .agent-card:hover { transform: translateY(-1px); }
    .dark .agent-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .agent-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  </style>
</head>
<body class="dark bg-zinc-950 text-zinc-300 min-h-screen transition-colors duration-300">
<!-- Light mode uses bg-white, text-zinc-700 via toggle_theme -->

  <!-- Header -->
  <header class="border-b dark:border-zinc-800 border-zinc-200 dark:bg-zinc-950/80 bg-white/90 backdrop-blur-xl sticky top-0 z-50 transition-colors">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <span class="text-white text-[11px] font-bold">S</span>
        </div>
        <span class="text-sm font-semibold dark:text-white text-zinc-900 tracking-tight">Soren</span>
        <span class="text-[10px] dark:text-zinc-500 text-zinc-500 ml-0.5 font-medium">DASHBOARD</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="stats-bar" class="text-[11px] dark:text-zinc-400 text-zinc-600"></span>
        <div class="flex items-center gap-1.5">
          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 live-dot"></div>
          <span class="text-[11px] dark:text-zinc-500 text-zinc-500" id="refresh-time">Connecting...</span>
        </div>
        <button id="theme-toggle" onclick="toggle_theme()" class="w-8 h-8 rounded-lg dark:bg-zinc-800 bg-zinc-100 dark:hover:bg-zinc-700 hover:bg-zinc-200 flex items-center justify-center transition-colors" title="Toggle theme">
          <svg id="theme-icon-dark" class="w-4 h-4 dark:text-zinc-400 text-zinc-500 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="theme-icon-light" class="w-4 h-4 dark:text-zinc-400 text-zinc-500 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">

    <!-- Agent Visual Grid -->
    <section id="agent-grid" class="mb-10"></section>

    <!-- Disabled agents -->
    <section id="disabled-agents" class="mb-8"></section>

    <!-- Section Label -->
    <div class="flex items-center gap-3 mb-4">
      <h2 class="text-[13px] font-semibold dark:text-zinc-200 text-zinc-700 uppercase tracking-wider">Activity Log</h2>
      <div class="flex-1 h-px dark:bg-zinc-800 bg-zinc-200"></div>
    </div>

    <!-- Filters -->
    <div class="flex items-center gap-2 mb-5">
      <div class="flex dark:bg-zinc-800/80 bg-zinc-100/80 rounded-lg p-0.5 border dark:border-transparent border-zinc-200">
        <button class="filter-btn px-3 py-1.5 text-[11px] font-medium rounded-md transition-all" data-filter="all">All</button>
        <button class="filter-btn px-3 py-1.5 text-[11px] font-medium rounded-md transition-all" data-filter="running">Running</button>
        <button class="filter-btn px-3 py-1.5 text-[11px] font-medium rounded-md transition-all" data-filter="success">Passed</button>
        <button class="filter-btn px-3 py-1.5 text-[11px] font-medium rounded-md transition-all" data-filter="error">Failed</button>
      </div>
      <div class="flex-1"></div>
      <select id="agent-filter" class="dark:bg-zinc-800 bg-zinc-100/80 dark:text-zinc-300 text-zinc-700 text-[11px] rounded-lg px-2.5 py-1.5 dark:border-zinc-700 border-zinc-300 border focus:outline-none focus:ring-1 focus:ring-indigo-500/50 appearance-none cursor-pointer">
        <option value="all">All agents</option>
      </select>
    </div>

    <!-- Timeline -->
    <section id="timeline"></section>
    <div id="empty-state" class="hidden py-20 text-center">
      <div class="dark:text-zinc-500 text-zinc-500 text-sm">No activity matches your filters</div>
    </div>

  </main>

    // ── Helpers ──────────────────────────────────────────

    function time_ago(ts) {
      var s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
      if (s < 10) return 'just now';
      if (s < 60) return s + 's ago';
      var m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    function fmt_duration(sec) {
      if (sec == null) return '';
      if (sec < 60) return Math.round(sec) + 's';
      return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
    }

    function fmt_time(ts) {
      return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function fmt_date(ts) {
      var d = new Date(ts);
      var today = new Date();
      var yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      if (d.toDateString() === today.toDateString()) return 'Today';
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function status_theme(s) {
      return {
        running: { dot: 'bg-indigo-500', text: 'dark:text-indigo-300 text-indigo-700', bg: 'dark:bg-indigo-500/15 bg-indigo-50', border: 'dark:border-indigo-500/25 border-indigo-200', icon: '<div class="spinner w-3.5 h-3.5 text-indigo-500"></div>' },
        success: { dot: 'bg-emerald-500', text: 'dark:text-emerald-300 text-emerald-700', bg: 'dark:bg-emerald-500/10 bg-emerald-50', border: 'dark:border-emerald-500/20 border-emerald-200', icon: '<svg class="w-3.5 h-3.5 text-emerald-600 dark:text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>' },
        error:   { dot: 'bg-red-500', text: 'dark:text-red-300 text-red-700', bg: 'dark:bg-red-500/10 bg-red-50', border: 'dark:border-red-500/20 border-red-200', icon: '<svg class="w-3.5 h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>' },
      }[s] || { dot: 'bg-zinc-400', text: 'dark:text-zinc-400 text-zinc-600', bg: 'dark:bg-zinc-500/10 bg-zinc-100', border: 'dark:border-zinc-600 border-zinc-300', icon: '' };
    }

    function get_agent_icon(key) {
      return AGENT_ICONS[key] || DEFAULT_ICON;
    }

    // ── Theme Toggle ─────────────────────────────────────

    function toggle_theme() {
      var html = document.documentElement;
      var body = document.body;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        body.classList.remove('bg-zinc-950', 'text-zinc-300');
        body.classList.add('bg-white', 'text-zinc-700');
        localStorage.setItem('soren-theme', 'light');
      } else {
        html.classList.add('dark');
        body.classList.remove('bg-white', 'text-zinc-700');
        body.classList.add('bg-zinc-950', 'text-zinc-300');
        localStorage.setItem('soren-theme', 'dark');
      }
    }

    function init_theme() {
      var saved = localStorage.getItem('soren-theme');
      if (saved === 'light') {
        document.documentElement.classList.remove('dark');
        document.body.classList.remove('bg-zinc-950', 'text-zinc-300');
        document.body.classList.add('bg-white', 'text-zinc-700');
      }
    }

    // ── Agent Visual Grid ────────────────────────────────

    function render_grid() {
      if (!data) return;
      var el = document.getElementById('agent-grid');
      var dis_el = document.getElementById('disabled-agents');
      var agents = data.agents || {};
      var keys = Object.keys(agents).sort(function(a, b) {
        var ae = agents[a].status === 'enabled' ? 0 : 1;
        var be = agents[b].status === 'enabled' ? 0 : 1;
        return ae !== be ? ae - be : agents[a].name.localeCompare(agents[b].name);
      });

      var enabled = keys.filter(function(k) { return agents[k].status === 'enabled'; });
      var disabled = keys.filter(function(k) { return agents[k].status !== 'enabled'; });

      // Enabled agents — visual cards with icons
      var html = '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">';

      for (var i = 0; i < enabled.length; i++) {
        var k = enabled[i];
        var a = agents[k];
        var ai = get_agent_icon(k);
        var runs = (data.runs || []).filter(function(r) { return r.agent === k; });
        var is_running = runs.length > 0 && runs[0].status === 'running';
        var last = runs.length > 0 ? runs[0] : null;
        var recent_24h = runs.filter(function(r) { return (Date.now() - new Date(r.timestamp).getTime()) < 86400000; });
        var errors_24h = recent_24h.filter(function(r) { return r.status === 'error'; });
        var success_rate = recent_24h.length > 0 ? Math.round((recent_24h.length - errors_24h.length) / recent_24h.length * 100) : 100;

        // Sparkline
        var spark_runs = runs.filter(function(r) { return r.status !== 'running'; }).slice(0, 16).reverse();
        var sparkline = '<div class="flex items-center gap-[3px]">';
        for (var j = 0; j < spark_runs.length; j++) {
          var color = spark_runs[j].status === 'success' ? 'bg-emerald-500' : 'bg-red-500';
          sparkline += '<div class="spark-dot ' + color + '" title="' + fmt_time(spark_runs[j].timestamp) + '"></div>';
        }
        sparkline += '</div>';

        var card_border = is_running ? 'dark:border-indigo-500/40 border-indigo-300 dark:bg-indigo-500/[0.04] bg-indigo-50/50' : 'dark:border-zinc-800 border-zinc-200 dark:bg-zinc-900/50 bg-white shadow-sm';
        var selected_border = agent_filter === k ? ' ring-2 ring-indigo-500/50' : '';

        html += '<div class="agent-card border rounded-2xl p-5 cursor-pointer ' + card_border + selected_border + '" onclick="filter_by_agent(\'' + k + '\')">';

        // Icon + name row
        html += '  <div class="flex items-start justify-between mb-4">';
        html += '    <div class="flex items-center gap-3">';

        // Agent icon with gradient background
        html += '      <div class="agent-icon-wrap">';
        if (is_running) {
          html += '        <div class="absolute inset-0 rounded-xl bg-gradient-to-br ' + ai.color + ' opacity-40 pulse-ring"></div>';
        }
        html += '        <div class="relative w-11 h-11 rounded-xl bg-gradient-to-br ' + ai.color + ' flex items-center justify-center text-white shadow-lg ' + ai.shadow + '">';
        html += '          ' + ai.icon;
        html += '        </div>';
        html += '      </div>';

        html += '      <div>';
        html += '        <div class="text-[13px] font-semibold dark:text-white text-zinc-800">' + a.name + '</div>';
        html += '        <div class="text-[11px] dark:text-zinc-500 text-zinc-500 mt-0.5">' + a.schedule + '</div>';
        html += '      </div>';
        html += '    </div>';

        // Status badge
        if (is_running) {
          html += '    <div class="flex items-center gap-1.5 px-2 py-1 rounded-full bg-indigo-500/15 border border-indigo-500/25">';
          html += '      <div class="spinner w-3 h-3 text-indigo-400"></div>';
          html += '      <span class="text-[10px] font-medium text-indigo-400">LIVE</span>';
          html += '    </div>';
        } else {
          var badge_color = errors_24h.length > 0 ? 'bg-amber-500' : 'bg-emerald-500';
          html += '    <div class="w-2.5 h-2.5 rounded-full ' + badge_color + ' mt-1"></div>';
        }
        html += '  </div>';

        // Last run info
        html += '  <div class="flex items-center justify-between mb-3">';
        if (is_running) {
          html += '    <span class="text-[12px] text-indigo-400 font-medium">Running now...</span>';
        } else if (last) {
          html += '    <span class="text-[12px] dark:text-zinc-400 text-zinc-600">' + time_ago(last.timestamp) + '</span>';
          html += '    <span class="text-[11px] dark:text-zinc-500 text-zinc-500 tabular-nums">' + fmt_duration(last.duration_seconds) + '</span>';
        } else {
          html += '    <span class="text-[12px] dark:text-zinc-600 text-zinc-500">No runs yet</span>';
        }
        html += '  </div>';

        // Sparkline + success rate
        html += '  <div class="flex items-center justify-between">';
        html += '    ' + sparkline;
        var bar_color = success_rate === 100 ? 'bg-emerald-500' : success_rate >= 90 ? 'bg-amber-500' : 'bg-red-500';
        html += '    <div class="flex items-center gap-2">';
        html += '      <div class="w-16 h-1.5 dark:bg-zinc-800 bg-zinc-200/80 rounded-full overflow-hidden">';
        html += '        <div class="h-full ' + bar_color + ' rounded-full transition-all" style="width:' + success_rate + '%"></div>';
        html += '      </div>';
        html += '      <span class="text-[10px] dark:text-zinc-500 text-zinc-500 w-7 text-right tabular-nums">' + success_rate + '%</span>';
        html += '    </div>';
        html += '  </div>';

        html += '</div>';
      }
      html += '</div>';
      el.innerHTML = html;

      // Disabled agents — compact row with mini icons
      if (disabled.length > 0) {
        var dhtml = '<div class="flex items-center gap-2 mb-2">';
        dhtml += '  <span class="text-[11px] dark:text-zinc-600 text-zinc-500 font-medium uppercase tracking-wider">Inactive</span>';
        dhtml += '  <div class="flex-1 h-px dark:bg-zinc-800/50 bg-zinc-200"></div>';
        dhtml += '</div>';
        dhtml += '<div class="flex flex-wrap gap-2">';
        for (var di = 0; di < disabled.length; di++) {
          var dk = disabled[di];
          var da = agents[dk];
          var dai = get_agent_icon(dk);
          var d_selected = agent_filter === dk ? ' ring-2 ring-indigo-500/50' : '';
          dhtml += '<span class="inline-flex items-center gap-2 px-3 py-1.5 dark:bg-zinc-900/50 bg-zinc-50 dark:border-zinc-800 border-zinc-200 border rounded-lg text-[11px] dark:text-zinc-500 text-zinc-600 cursor-pointer dark:hover:text-zinc-300 hover:text-zinc-900 transition-colors shadow-sm' + d_selected + '" onclick="filter_by_agent(\'' + dk + '\')">';
          dhtml += '  <div class="w-5 h-5 rounded-md bg-gradient-to-br ' + dai.color + ' flex items-center justify-center text-white opacity-40"><svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg></div>';
          dhtml += '  ' + da.name;
          dhtml += '</span>';
        }
        dhtml += '</div>';
        dis_el.innerHTML = dhtml;
      } else {
        dis_el.innerHTML = '';
      }
    }

    // ── Agent Filter Dropdown ───────────────────────────

    function render_agent_select() {
      if (!data) return;
      var sel = document.getElementById('agent-filter');
      var agents = data.agents || {};
      var html = '<option value="all">All agents</option>';
      var keys = Object.keys(agents).sort(function(a, b) { return agents[a].name.localeCompare(agents[b].name); });
      for (var i = 0; i < keys.length; i++) {
        html += '<option value="' + keys[i] + '"' + (agent_filter === keys[i] ? ' selected' : '') + '>' + agents[keys[i]].name + '</option>';
      }
      sel.innerHTML = html;
    }

    // ── Timeline ────────────────────────────────────────

    function render_timeline() {
      if (!data) return;
      var el = document.getElementById('timeline');
      var empty = document.getElementById('empty-state');
      var runs = (data.runs || []).filter(function(r) {
        if (status_filter !== 'all' && r.status !== status_filter) return false;
        if (agent_filter !== 'all' && r.agent !== agent_filter) return false;
        return true;
      });

      if (runs.length === 0) { el.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      var html = '';
      var cur_date = '';

      for (var i = 0; i < runs.length; i++) {
        var r = runs[i];
        var dl = fmt_date(r.timestamp);
        var t = status_theme(r.status);
        var name = (data.agents[r.agent] || {}).name || r.agent;
        var ai = get_agent_icon(r.agent);

        // Date header
        if (dl !== cur_date) {
          cur_date = dl;
          if (i > 0) html += '<div class="h-5"></div>';
          html += '<div class="text-[11px] font-semibold dark:text-zinc-400 text-zinc-600 mb-2 uppercase tracking-wider">' + dl + '</div>';
        }

        // Run row
        html += '<div class="run-row group rounded-lg mb-px">';
        html += '  <div class="flex items-center gap-3 px-3 py-2.5 cursor-pointer select-none" onclick="toggle(this)">';

        // Mini agent icon
        html += '    <div class="w-6 h-6 rounded-md bg-gradient-to-br ' + ai.color + ' flex items-center justify-center text-white flex-shrink-0 opacity-80">';
        html += '      <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>';
        html += '    </div>';

        // Status icon
        html += '    <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">' + t.icon + '</div>';

        // Time
        html += '    <span class="text-[11px] dark:text-zinc-500 text-zinc-500 w-[72px] flex-shrink-0 tabular-nums">' + fmt_time(r.timestamp) + '</span>';

        // Agent pill
        html += '    <span class="px-2 py-0.5 text-[10px] font-medium rounded-full ' + t.bg + ' ' + t.text + ' border ' + t.border + ' flex-shrink-0">' + name + '</span>';

        // Summary
        var summary_text = r.status === 'running' ? (r.summary || 'Starting up...') : (r.summary || '');
        var summary_color = r.status === 'running' ? 'dark:text-indigo-300 text-indigo-700' : r.status === 'error' ? 'dark:text-red-300 text-red-700' : 'dark:text-zinc-200 text-zinc-800';
        html += '    <span class="text-[12px] ' + summary_color + ' flex-1 truncate">' + summary_text + '</span>';

        // Duration
        if (r.status === 'running') {
          html += '    <span class="text-[10px] dark:text-indigo-400/60 text-indigo-600 flex-shrink-0 tabular-nums">in progress</span>';
        } else if (r.duration_seconds) {
          html += '    <span class="text-[10px] dark:text-zinc-500 text-zinc-500 flex-shrink-0 tabular-nums">' + fmt_duration(r.duration_seconds) + '</span>';
        }

        // Chevron
        html += '    <svg class="chevron w-3.5 h-3.5 dark:text-zinc-600 text-zinc-400 group-hover:text-zinc-500 transition-all flex-shrink-0" style="transition:transform .2s" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';

        html += '  </div>';

        // Expandable details
        html += '  <div class="expandable">';
        html += '    <div>';
        html += '      <div class="pl-14 pr-3 pb-3">';
        html += '        <div class="border-l-2 dark:border-zinc-700 border-zinc-300 pl-4 py-2">';
        if (r.details) {
          html += '          <p class="text-[12px] dark:text-zinc-400 text-zinc-600 leading-relaxed">' + r.details + '</p>';
        }
        if (r.errors && r.errors.length > 0) {
          html += '          <div class="mt-2 flex items-start gap-2 px-3 py-2 dark:bg-red-500/5 bg-red-50 dark:border-red-500/10 border-red-200 border rounded-lg">';
          html += '            <svg class="w-3.5 h-3.5 text-red-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>';
          html += '            <span class="text-[11px] dark:text-red-300 text-red-600">' + r.errors.join(', ') + '</span>';
          html += '          </div>';
        }
        html += '          <div class="mt-2 flex gap-4 text-[10px] dark:text-zinc-600 text-zinc-500">';
        if (r.duration_seconds) html += '            <span>Duration: ' + fmt_duration(r.duration_seconds) + '</span>';
        html += '            <span>Agent: ' + r.agent + '</span>';
        html += '          </div>';
        html += '        </div>';
        html += '      </div>';
        html += '    </div>';
        html += '  </div>';

        html += '</div>';
      }

      el.innerHTML = html;
    }

    function toggle(el) {
      var exp = el.nextElementSibling;
      var chev = el.querySelector('.chevron');
      exp.classList.toggle('open');
      chev.style.transform = exp.classList.contains('open') ? 'rotate(90deg)' : '';
    }

    // ── Filters ─────────────────────────────────────────

    function set_filter(f) {
      status_filter = f;
      document.querySelectorAll('.filter-btn').forEach(function(b) {
        if (b.dataset.filter === f) {
          b.classList.add('dark:bg-white/10', 'bg-white', 'dark:text-white', 'text-zinc-900', 'shadow-sm');
          b.classList.remove('dark:text-zinc-500', 'text-zinc-500');
        } else {
          b.classList.remove('dark:bg-white/10', 'bg-white', 'dark:text-white', 'text-zinc-900', 'shadow-sm');
          b.classList.add('dark:text-zinc-500', 'text-zinc-500');
        }
      });
      render_timeline();
    }

    function filter_by_agent(k) {
      agent_filter = agent_filter === k ? 'all' : k;
      document.getElementById('agent-filter').value = agent_filter;
      render_timeline();
      render_grid();
    }

    // ── Stats Bar ───────────────────────────────────────

    function render_stats() {
      if (!data) return;
      var runs_24h = (data.runs || []).filter(function(r) { return (Date.now() - new Date(r.timestamp).getTime()) < 86400000; });
      var running = runs_24h.filter(function(r) { return r.status === 'running'; }).length;
      var errors = runs_24h.filter(function(r) { return r.status === 'error'; }).length;
      var total = runs_24h.length;

      var parts = [];
      if (running > 0) parts.push('<span class="text-indigo-400">' + running + ' running</span>');
      parts.push(total + ' runs');
      if (errors > 0) parts.push('<span class="text-red-400">' + errors + ' failed</span>');
      else parts.push('<span class="text-emerald-500">0 failed</span>');

      document.getElementById('stats-bar').innerHTML = parts.join('<span class="dark:text-zinc-700 text-zinc-400 mx-1">&middot;</span>');
    }

    // ── Data Loading ────────────────────────────────────

    async function load() {
      try {
        var res = await fetch('data/runs.json?_=' + Date.now());
        data = await res.json();
        render_grid();
        render_agent_select();
        render_timeline();
        render_stats();
        document.getElementById('refresh-time').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        if (typeof schedule_poll === 'function') schedule_poll();
      } catch (e) {
        console.error('Load failed:', e);
        document.getElementById('refresh-time').textContent = 'Update failed';
      }
    }

    // ── Init ────────────────────────────────────────────

    init_theme();

    document.querySelectorAll('.filter-btn').forEach(function(b) {
      b.addEventListener('click', function() { set_filter(this.dataset.filter); });
    });
    document.getElementById('agent-filter').addEventListener('change', function() {
      agent_filter = this.value;
      render_timeline();
      render_grid();
    });

    var poll_timer = null;
    function schedule_poll() {
      if (poll_timer) clearInterval(poll_timer);
      var has_running = data && data.runs && data.runs.some(function(r) { return r.status === 'running'; });
      var interval = has_running ? 15000 : 60000;
      poll_timer = setInterval(load, interval);
    }

    set_filter('all');
    load();
  </script>
</body>
</html>
